<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexia | Cyber Elite Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); border-color: #00d4ff; }
        body { background: #050505; color: #e0e0e0; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="text-center mb-16">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400">NEXIA</h1>
        <p class="text-slate-500 mt-2">نخبة الأدوات السيبرانية العالمية</p>
    </header>
    <main id="tools" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto"></main>
    <script>
        fetch('apps.json').then(r => r.json()).then(data => {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="glass p-6 rounded-2xl glow transition-all">
                    <h2 class="text-xl font-bold mb-2 text-cyan-400">${app.name}</h2>
                    <p class="text-sm text-slate-400 mb-6">${app.description}</p>
                    <a href="${app.download_url}" class="w-full block text-center bg-cyan-900/30 border border-cyan-500/50 py-2 rounded-lg hover:bg-cyan-500 hover:text-black transition">تثبيت الأداة</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
