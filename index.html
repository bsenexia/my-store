<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexia | Enterprise Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; color: #1e293b; }
        .nav-link { color: #1e293b; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { color: #059669; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 50; }
        .card { background: #f0fdf4; border: 1px solid #dcfce7; }
        .btn-green { background: #059669; color: white; }
    </style>
</head>
<body>
    <div id="mobileMenu" class="menu-overlay p-10">
        <button onclick="toggleMenu()" class="text-3xl mb-10">✕</button>
        <div class="flex flex-col gap-6 text-2xl font-bold">
            <a href="#" class="nav-link">الرئيسية</a>
            <a href="#" class="nav-link">الحلول</a>
            <a href="#" class="nav-link">الأدوات</a>
        </div>
    </div>

    <nav class="bg-white px-6 md:px-16 py-6 flex items-center justify-between border-b border-gray-100">
        <div class="text-3xl font-black tracking-tighter text-[#059669]">NEXIA</div>
        <div class="hidden md:flex gap-10">
            <a href="#" class="nav-link">الرئيسية</a>
            <a href="#" class="nav-link">الحلول</a>
            <a href="#" class="nav-link">الأدوات</a>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-[#059669] text-2xl">☰</button>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-16">
        <header class="mb-20">
            <h1 class="text-5xl font-extrabold text-[#064e3b]">ابتكار برمجيات للجميع</h1>
        </header>
        <div id="tools" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        fetch('apps.json').then(r => r.json()).then(data => {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="card p-8 rounded-2xl">
                    <h2 class="text-2xl font-bold text-[#064e3b]">${app.name}</h2>
                    <p class="text-gray-600 my-6">${app.description}</p>
                    <button onclick="navigator.clipboard.writeText('${app.install_cmd}'); alert('تم النسخ')" 
                            class="w-full btn-green py-3 rounded-lg font-bold">تثبيت الأداة</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
