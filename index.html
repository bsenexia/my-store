<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>Nexia | Cyber Elite Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #050505; --text: #e0e0e0; }
        .light { --bg: #ffffff; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .glass { background: rgba(128, 128, 128, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(128, 128, 128, 0.2); }
    </style>
</head>
<body class="p-6">
    <header class="text-center mb-10">
        <button onclick="toggleTheme()" class="fixed top-4 left-4 p-2 bg-slate-800 rounded-full">🌓</button>
        <h1 class="text-4xl font-black text-cyan-400">NEXIA</h1>
        <div id="categories" class="mt-4 flex flex-wrap justify-center gap-2"></div>
    </header>
    
    <main id="tools" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto"></main>

    <script>
        function toggleTheme() {
            document.getElementById('html-root').classList.toggle('light');
        }

        let allApps = [];
        async function loadData() {
            const res = await fetch('apps.json');
            allApps = await res.json();
            const cats = ['الكل', ...new Set(allApps.map(a => a.category))];
            document.getElementById('categories').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="px-3 py-1 rounded bg-slate-800 text-xs hover:bg-cyan-900 transition">${c}</button>`
            ).join('');
            render(allApps);
        }

        function filter(cat) {
            render(cat === 'الكل' ? allApps : allApps.filter(a => a.category === cat));
        }

        function render(data) {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="glass p-5 rounded-xl">
                    <div class="flex justify-between items-center mb-2 text-xs">
                        <span class="bg-cyan-900 px-2 py-0.5 rounded text-cyan-200">${app.category}</span>
                        <span>⭐ ${app.rating}.0</span>
                    </div>
                    <h2 class="text-lg font-bold">${app.name}</h2>
                    <p class="text-sm opacity-70 mb-4">${app.description}</p>
                    <button onclick="navigator.clipboard.writeText('${app.install_cmd}'); alert('تم النسخ!')" class="w-full border border-cyan-500 py-1.5 rounded hover:bg-cyan-500 hover:text-black transition">نسخ أمر التثبيت</button>
                </div>
            `).join('');
        }
        loadData();
    </script>
</body>
</html>
