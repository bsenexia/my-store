<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexia | Cyber Elite Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); border-color: #00d4ff; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.1); border-top: 4px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body { background: #050505; color: #e0e0e0; }
    </style>
</head>
<body class="p-4 md:p-10">
    <header class="text-center mb-10">
        <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400">NEXIA</h1>
        <p class="text-slate-500 mt-2">نخبة الأدوات السيبرانية العالمية</p>
        <div class="mt-6 flex flex-wrap justify-center gap-2" id="categories"></div>
        <input type="text" id="search" placeholder="ابحث عن أداة..." class="mt-6 w-full max-w-md bg-slate-900 border border-slate-700 p-3 rounded-xl focus:outline-none focus:border-cyan-500">
    </header>

    <div id="loader" class="flex justify-center mt-20"><div class="spinner"></div></div>
    <main id="tools" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto"></main>

    <script>
        let allApps = [];
        fetch('apps.json').then(r => r.json()).then(data => {
            allApps = data;
            document.getElementById('loader').style.display = 'none';
            const cats = ['الكل', ...new Set(data.map(a => a.category))];
            document.getElementById('categories').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="px-4 py-1 rounded-full bg-slate-800 hover:bg-cyan-900 transition">${c}</button>`
            ).join('');
            render(data);
        });

        function filter(cat) {
            render(cat === 'الكل' ? allApps : allApps.filter(a => a.category === cat));
        }

        function render(data) {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="glass p-6 rounded-2xl glow transition-all">
                    <h2 class="text-xl font-bold mb-2 text-cyan-400">${app.name}</h2>
                    <p class="text-sm text-slate-400 mb-4">${app.description}</p>
                    <div class="text-[10px] font-mono text-slate-600 mb-4 bg-black/50 p-2 rounded truncate" title="SHA-256 Hash">SHA: ${app.hash || 'N/A'}</div>
                    <a href="${app.download_url}" class="w-full block text-center bg-cyan-900/30 border border-cyan-500/50 py-2 rounded-lg hover:bg-cyan-500 hover:text-black transition">تثبيت الأداة</a>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(allApps.filter(a => a.name.toLowerCase().includes(val)));
        });
    </script>
</body>
</html>
