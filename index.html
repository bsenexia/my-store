<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexia | Cyber Elite Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow:hover { box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); border-color: #00d4ff; }
        body { background: #050505; color: #e0e0e0; }
    </style>
</head>
<body class="p-6">
    <header class="text-center mb-10">
        <h1 class="text-4xl font-black text-cyan-400">NEXIA</h1>
        <div id="categories" class="mt-4 flex flex-wrap justify-center gap-2"></div>
    </header>
    
    <main id="tools" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto"></main>

    <script>
        let allApps = [];
        fetch('apps.json').then(r => r.json()).then(data => {
            allApps = data;
            const cats = ['الكل', ...new Set(data.map(a => a.category))];
            document.getElementById('categories').innerHTML = cats.map(c => 
                `<button onclick="filter('${c}')" class="px-3 py-1 rounded bg-slate-800 text-xs hover:bg-cyan-900">${c}</button>`
            ).join('');
            render(data);
        });

        function filter(cat) {
            render(cat === 'الكل' ? allApps : allApps.filter(a => a.category === cat));
        }

        function render(data) {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="glass p-5 rounded-xl glow">
                    <span class="text-[10px] bg-cyan-900 px-2 py-0.5 rounded text-cyan-200">${app.category}</span>
                    <h2 class="text-lg font-bold mt-2">${app.name}</h2>
                    <p class="text-sm text-slate-400 mb-4">${app.description}</p>
                    <div class="text-[9px] font-mono bg-black p-2 rounded mb-4 truncate text-slate-500">Hash: ${app.hash}</div>
                    <a href="${app.download_url}" class="block text-center border border-cyan-500 text-cyan-400 py-1.5 rounded hover:bg-cyan-500 hover:text-black">تثبيت</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
