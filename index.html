<div class="flex justify-center gap-4 mb-12">
    <button onclick="filterTools('all')" class="px-4 py-2 bg-gray-200 rounded-full text-sm font-bold">الكل</button>
    <button onclick="filterTools('linux')" class="px-4 py-2 bg-gray-200 rounded-full text-sm font-bold">Linux</button>
    <button onclick="filterTools('windows')" class="px-4 py-2 bg-gray-200 rounded-full text-sm font-bold">Windows</button>
</div>

<script>
    // متغير لتخزين البيانات الأصلية
    let currentData = [];

    // جلب البيانات أولاً
    fetch('apps.json').then(r => r.json()).then(data => {
        currentData = data;
        renderTools(data);
    });

    // دالة الفلترة
    function filterTools(os) {
        if (os === 'all') {
            renderTools(currentData);
        } else {
            const filtered = currentData.filter(app => app.os.includes(os));
            renderTools(filtered);
        }
    }

    // دالة العرض
    function renderTools(data) {
        document.getElementById('tools').innerHTML = data.map(app => `
            <div class="card p-8 rounded-2xl">
                <h2 class="text-2xl font-bold text-[#064e3b]">${app.name}</h2>
                <p class="text-gray-600 my-4">${app.description}</p>
                <button onclick="navigator.clipboard.writeText('${app.install_cmd}')" class="w-full btn-green py-3 rounded-lg font-bold">تثبيت</button>
            </div>
        `).join('');
    }
</script>
