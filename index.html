<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexia Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e0e0e0; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">
    <h1 class="text-3xl font-bold text-center text-cyan-400 mb-6">NEXIA</h1>
    <div id="tools" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto"></div>
    <script>
        fetch('apps.json').then(r => r.json()).then(data => {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="glass p-4 rounded-lg">
                    <h2 class="font-bold">${app.name}</h2>
                    <p class="text-xs text-slate-400 mb-2">${app.description}</p>
                    <button onclick="alert('تم نسخ الأمر')" class="w-full bg-cyan-900 py-1 rounded text-xs">نسخ أمر التثبيت</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
