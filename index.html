<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexia | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .nav-link { color: #475569; font-weight: 500; transition: color 0.2s; }
        .nav-link:hover { color: #0891b2; }
        .card { background: white; border-bottom: 3px solid #00d4ff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <!-- شريط التنقل الاحترافي -->
    <nav class="bg-white border-b border-slate-200 px-4 md:px-10 py-4 flex items-center justify-between">
        <div class="text-2xl font-black text-slate-900">NEXIA</div>
        <div class="hidden md:flex gap-8">
            <a href="#" class="nav-link">الرئيسية</a>
            <a href="#" class="nav-link">التوثيق</a>
            <a href="#" class="nav-link">المجتمع</a>
            <a href="#" class="nav-link">الدعم</a>
        </div>
        <button class="md:hidden text-slate-900">☰</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-10">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900">مركز البرمجيات</h1>
            <p class="text-slate-600 mt-2">استكشف أدواتنا الموثوقة للمحترفين</p>
        </header>

        <div id="tools" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </main>

    <script>
        fetch('apps.json').then(r => r.json()).then(data => {
            document.getElementById('tools').innerHTML = data.map(app => `
                <div class="card p-6 rounded-sm hover:translate-y-[-5px] transition-all">
                    <span class="text-[10px] font-bold text-cyan-600 uppercase tracking-widest">${app.category}</span>
                    <h2 class="text-xl font-bold mt-1 mb-3">${app.name}</h2>
                    <p class="text-slate-600 text-sm mb-6 leading-relaxed">${app.description}</p>
                    <button onclick="navigator.clipboard.writeText('${app.install_cmd}'); alert('تم النسخ')" 
                            class="w-full bg-slate-900 text-white py-2 text-sm font-semibold hover:bg-cyan-600 transition">تثبيت الأداة</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
